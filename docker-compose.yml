services:
  backend:
    build: ./backend
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    ports: ["${BACKEND_HOST_PORT:-8080}:8080"]
    depends_on:
      db:
        condition: service_healthy
  frontend:
    build: ./frontend
    ports: ["${FRONTEND_HOST_PORT:-4200}:80"]
    depends_on: [backend]
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${DB_NAME:-dars_ma}
      POSTGRES_USER: ${DB_USER:-dars_ma_app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    ports: ["${DB_HOST_PORT:-5432}:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-dars_ma_app}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
