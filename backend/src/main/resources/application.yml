spring:
  application:
    name: dars-ma-backend
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:dars_ma}
    username: ${DB_USER:dars_ma_app}
    password: ${DB_PASSWORD:changeme}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

jwt:
  # Fallback is 64 bytes (512 bits) — comfortably over HMAC-SHA's 256-bit minimum. Dev-only; real deployments must override via JWT_SIGNING_KEY.
  signing-key: ${JWT_SIGNING_KEY:dev-only-signing-key-do-not-use-in-production-please-change-me-now}
  access-ttl-minutes: ${JWT_ACCESS_TTL_MIN:15}
  refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:7}

app:
  cookie-secure: ${COOKIE_SECURE:false}

management:
  endpoints:
    web:
      exposure:
        include: health,info
