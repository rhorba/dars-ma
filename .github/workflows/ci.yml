name: ci
on: [push, pull_request]
permissions:
  contents: read

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build & test with coverage gate
        working-directory: backend
        run: ./mvnw -B verify

  frontend-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npm run test -- --watch=false

  security:
    runs-on: ubuntu-latest
    steps:
      # gitleaks-action diffs across the pushed commit range; a shallow checkout can't
      # resolve that range when a push contains more than one commit.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      # Trivy's Java analyzer resolves parent POMs over the network unless they're already
      # in ~/.m2 — without this it can hit Maven Central's rate limit (429) on shared runners.
      - name: Warm Maven cache for Trivy's Java analyzer
        working-directory: backend
        run: ./mvnw -B dependency:go-offline
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: '1'
      - uses: gitleaks/gitleaks-action@v2

  build:
    needs: [backend-test, frontend-test, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env for compose build
        run: cp .env.example .env
      - name: Build Docker images
        run: docker compose build
