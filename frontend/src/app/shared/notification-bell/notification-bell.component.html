<button mat-icon-button [matMenuTriggerFor]="notificationMenu" (menuOpened)="onMenuOpened()"
        [matBadge]="unreadCount()" [matBadgeHidden]="unreadCount() === 0" matBadgeColor="warn"
        [attr.aria-label]="'notifications.title' | translate">
  <mat-icon>notifications</mat-icon>
</button>

<mat-menu #notificationMenu="matMenu" class="notification-menu">
  @if (notifications().length === 0) {
    <div class="notification-empty" mat-menu-item disabled>{{ 'notifications.empty' | translate }}</div>
  } @else {
    @for (notification of notifications(); track notification.id) {
      <button mat-menu-item class="notification-item" [class.unread]="notification.readAt === null"
              (click)="markRead(notification)">
        <span class="notification-type">{{ ('notifications.types.' + notification.type) | translate }}</span>
        <span class="notification-date">{{ notification.createdAt | date: 'short' }}</span>
      </button>
    }
  }
</mat-menu>
